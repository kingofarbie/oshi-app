<!-- =====================
     1日手帳ビュー
===================== -->

<div id="dayPlanner" class="card" style="display:none;">

    <button
        class="back-button"
        onclick="backToCalendar()">

        ← カレンダーへ戻る

    </button>

    <h2 id="plannerTitle">

        📅

    </h2>

    <div id="plannerTimeline">

    </div>

    <hr>

    <h3>

        📝 今日の思い出

    </h3>

    <div id="plannerMemory">

        <div class="memory-item">

            📷 写真
            <button>追加</button>

        </div>

        <div class="memory-item">

            📹 動画
            <button>追加</button>

        </div>

        <div class="memory-item">

            📝 メモ
            <button>編集</button>

        </div>

        <div class="memory-item">

            💰 今日使った金額
            <button>入力</button>

        </div>

        <div class="memory-item">

            ⭐ 今日の評価
            <button>入力</button>

        </div>

        <div class="memory-item">

            😊 今日の一言
            <button>入力</button>

        </div>

    </div>

</div>



<div id="eventDetailModal" class="modal">

    <div class="modal-content">

        <div id="detail-title" class="modal-title"></div>

        <div id="detail-content"></div>

        <div class="event-button-area">

            <button
                id="detailMapBtn"
                class="map-btn"
                style="display:none;">
                🗺 地図
            </button>

            <button
                id="detailTicketBtn"
                class="map-btn"
                style="display:none;">
                🎫 チケット
            </button>

        </div>

        <div class="event-button-area">

            <button
                class="edit-btn"
                onclick="editCurrentEvent()">
                ✏️ 編集
            </button>

            <button
                class="event-delete-btn"
                onclick="deleteCurrentEvent()">
                🗑 削除
            </button>

        </div>

        <button onclick="closeEventDetail()">
            閉じる
        </button>

    </div>

</div>
