<!-- =====================
     1日手帳ビュー
===================== -->

<div id="dayPlanner" class="card" style="display:none;">

    <button
        class="back-button"
        onclick="backToCalendar()">

        ← カレンダーへ戻る

    </button>

    <h2 id="plannerTitle">

        📅

    </h2>

    <div id="plannerTimeline">

    </div>

    <hr>

    <h3>

        📝 今日の思い出

    </h3>

    <div id="plannerMemory">

        <div class="memory-item">

            📷 写真
            <button>追加</button>

        </div>

        <div class="memory-item">

            📹 動画
            <button>追加</button>

        </div>

        <div class="memory-item">

            📝 メモ
            <button>編集</button>

        </div>

        <div class="memory-item">

            💰 今日使った金額
            <button>入力</button>

        </div>

        <div class="memory-item">

            ⭐ 今日の評価
            <button>入力</button>

        </div>

        <div class="memory-item">

            😊 今日の一言
            <button>入力</button>

        </div>

    </div>

</div>
