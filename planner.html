<!-- =====================
     1日手帳ビュー
===================== -->

<div id="dayPlanner" class="card" style="display:none;">

    <h2 id="plannerTitle">

        📅

    </h2>

<div class="planner-top-bar">

    <button onclick="backToCalendar()">
        ← カレンダーへ戻る
    </button>

</div>


    <div id="plannerTimeline">

    </div>

    <hr>

<h3>📝 今日の思い出</h3>

<div id="plannerMemory">

    <div class="memory-section">
        <div class="memory-header">
            <span>📷 写真</span>
            <button onclick="addPhoto()">＋</button>
        </div>

        <div id="photoList" class="memory-list">
            写真はありません
        </div>
    </div>

    <div class="memory-section">
        <div class="memory-header">
            <span>🎥 動画</span>
            <button onclick="addVideo()">＋</button>
        </div>

        <div id="videoList" class="memory-list">
            動画はありません
        </div>
    </div>

    <div class="memory-section">
        <div class="memory-header">
            <span>📝 メモ</span>
            <button onclick="addMemo()">＋</button>
        </div>

        <div id="memoList" class="memory-list">
            メモはありません
        </div>
    </div>

    <div class="memory-section">
        <div class="memory-header">
            <span>💰 支出</span>
            <button onclick="addExpense()">＋</button>
        </div>

        <div id="expenseList" class="memory-list">
            支出はありません
        </div>
    </div>

    <div class="memory-section">
        <div class="memory-header">
            <span>⭐ 評価</span>
            <button onclick="addRating()">＋</button>
        </div>

        <div id="ratingView" class="memory-list">
            未評価
        </div>
    </div>

    <div class="memory-section">
        <div class="memory-header">
            <span>😊 今日の一言</span>
            <button onclick="addComment()">＋</button>
        </div>

        <div id="commentView" class="memory-list">
            まだありません
        </div>
    </div>

</div>


<div id="plannerBottomBar">

    <button onclick="backToCalendar()">
        ← 戻る
    </button>

    <button onclick="openEventForm()">
        ➕ 予定
    </button>

    <button onclick="openDayMemory()">
        📝 手帳
    </button>

</div>


</div>


<!-- =====================
メモ追加
===================== -->

<div id="memoModal" class="modal">

    <div class="modal-content">

        <h2>📝 メモ追加</h2>

        <textarea
            id="memoText"
            placeholder="今日の思い出を書こう..."
            rows="8">
        </textarea>

        <button onclick="saveMemo()">
            💾 保存
        </button>

        <button onclick="closeMemoModal()">
            キャンセル
        </button>

    </div>

</div>



<input
    type="file"
    id="photoPicker"
    accept="image/*"
    style="display:none"
    onchange="photoSelected(event)">
