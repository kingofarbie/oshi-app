<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 800 1600">

<rect width="100%" height="100%" fill="#050816"/>

<circle cx="100" cy="200" r="2" fill="white">
<animate attributeName="opacity"
values="0.2;1;0.2"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="500" r="3" fill="white">
<animate attributeName="opacity"
values="1;0.3;1"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="600" cy="300" r="2" fill="#60a5fa">
<animate attributeName="opacity"
values="0.2;1;0.2"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="500" cy="1200" r="4" fill="#93c5fd">
<animate attributeName="opacity"
values="1;0.3;1"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="650" cy="200" r="70"
fill="#1e3a8a"
opacity="0.4"/>

<circle cx="650" cy="200" r="45"
fill="#60a5fa"
opacity="0.3"/>

</svg>