<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>推し活手帳 v1.8</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="planner.css">


</head>


<body class="theme-neon-pink">

<div class="header">

<h1>推し活手帳</h1>

</div>




<!-- =====================
     ホーム
===================== -->


<div id="home" class="page active">


<div class="card">

<h2>🔔 新着通知</h2>

<div id="today-events" class="item">
該当なし
</div>

</div>



<div class="card">

<h2>📅 本日の予定</h2>

<div id="today-schedule" class="item">
該当なし
</div>

</div>


<div class="schedule-row"><div class="card half-card">

    <h2>🗓 今週の予定</h2>

    <div id="this-week-schedule" class="item">
    該当なし
    </div>

</div>


<div class="card half-card">

    <h2>📅 来週の予定</h2>

    <div id="next-week-schedule" class="item">
    該当なし
    </div>

</div>

</div><div class="card"><h2>📌 直近のイベント</h2>

<div id="upcoming-events" class="item">
該当なし
</div>

</div>






</div>



<!-- =====================
     カレンダー
===================== --


<div id="calendarPage" class="page">

===================== -->

<!-- =====================
     カレンダー本体
===================== -->

<div class="card">


<h2>
📅 カレンダー
</h2>


<div id="calendar">

</div>


</div>




<div id="dayMenuModal" class="modal">
    <div class="modal-content">

        <div id="dayMenuDate" class="modal-title">
            日付
        </div>

        <button onclick="addEventFromMenu()">
            ➕ 予定追加
        </button>

        <button onclick="editEventFromMenu()">
            ✏️ 予定編集
        </button>

        <button onclick="copyEventFromMenu()">
            📋 予定コピー
        </button>

        <button onclick="deleteEventFromMenu()">
            🗑 予定削除
        </button>

        <button onclick="closeDayMenu()">
            ❌ 閉じる
        </button>

    </div>

</div>


<div id="deleteSelectModal" class="modal">

    <div class="modal-content">

        <h3>
            削除する予定を選択
        </h3>

        <div id="deleteEventList"></div>

        <button onclick="deleteSelectedEvents()">
            🗑 削除
        </button>

        <button onclick="closeDeleteSelectModal()">
            ❌ キャンセル
        </button>

    </div>

</div>

<div id="eventSelectModal" class="modal">

    <div class="modal-content">

        <h3>
            予定を選択
        </h3>


        <div id="eventSelectList">

        </div>


        <button onclick="closeEventSelectModal()">
            ❌ 閉じる
        </button>


    </div>

</div>


<div id="copySelectModal" class="modal">

    <div class="modal-content">

        <h3>
            コピーする予定を選択
        </h3>

        <div id="copyEventList"></div>

        <button onclick="copySelectedEvents()">
            📋 コピー
        </button>

        <button onclick="closeCopySelectModal()">
            ❌ キャンセル
        </button>

    </div>

</div>
<- =====================
     選択日の操作
===================== -->


<div class="card">



</div>


<!--- =====================
     イベント入力ポップアップ
===================== -->

<div id="eventFormModal" class="modal">

    <div class="modal-content event-modal">

        <h2 id="eventFormTitle">
            ➕ 予定追加
        </h2>

        <select id="event-category">

            <option value="イベント">
                🎫 イベント
            </option>

            <option value="フェス">
                🎵 フェス
            </option>

            <option value="試合">
                ⚽ 試合
            </option>

        </select>

        <input
        type="text"
        id="event-title"
        placeholder="イベント名">

        <input
        type="datetime-local"
        id="event-date">

        <input
        type="text"
        id="event-place"
        placeholder="場所">

        <input
        type="text"
        id="meeting-time"
        placeholder="待ち合わせ時間">

        <input
        type="text"
        id="companions"
        placeholder="同伴者">

        <input
        type="url"
        id="map-url"
        placeholder="GoogleマップURL">

        <input
        type="url"
        id="ticket-url"
        placeholder="チケットURL">

        <button onclick="saveEvent()">
            💾 保存
        </button>

<button onclick="closeEventModal()">
キャンセル
</button>
    </div>

</div>


<!-- =====================
     推し
===================== -->


<div id="oshiPage" class="page">


<div class="card">


<h2>
⭐ 推し追加
</h2>



<select id="category-select">


<option value="artists">

🎤 アーティスト

</option>



<option value="sports">

⚽ スポーツ

</option>


</select>





<input
type="text"
id="oshi-search"
placeholder="推しを検索">





<button
onclick="addSelectedOshi()">

➕ 追加

</button>



<div id="search-results">

</div>



</div>







<div class="card">


<h2>
📚 推し一覧
</h2>



<div id="oshi-list">

該当なし

</div>



</div>


</div>


<!-- =====================
     設定
===================== -->


<div id="settingsPage" class="page">


<!--現在プラン表示--> 
<div class="card">

<p id="current-plan">
</p>

</div>


<!--設定タイトル--> 
<h2 class="settings-title">
設定
</h2>



<!--プラン-->
<div class="card setting-item">


<button onclick="toggleSetting('planMenu')">

<span id="planIcon">＋</span>
プラン

</button>


<div id="planMenu" class="setting-content" style="display:none;">

<div id="planList"></div>

</div>

</div>




<!--背景テーマ-->
<div class="card setting-item">


<button onclick="toggleSetting('themeMenu')">

<span id="themeIcon">＋</span>
背景テーマ

</button>

<div id="currentTheme">
現在：🌸 Pink
</div>


<div id="themeMenu" class="setting-content" style="display:none;">


<button onclick="setTheme('neon-pink')">
🩷 Pink
</button>


<button onclick="setTheme('neon-blue')">
💙 Blue
</button>


<button onclick="setTheme('neon-purple')">
💜 Purple
</button>


<button onclick="setTheme('neon-green')">
💚 Green
</button>


<button onclick="setTheme('neon-orange')">
🧡 Orange
</button>


<button onclick="setTheme('love')">
💕 恋愛
</button>


<button onclick="setTheme('space')">
🌌 宇宙
</button>


<button onclick="setTheme('passion')">
🔥 情熱
</button>


<button onclick="setTheme('cool')">
❄️ クール
</button>


<button onclick="setTheme('friendship')">
🤝 友情
</button>


</div>


</div>




<!--通知設定--> 
<div class="card setting-item">


<button onclick="toggleSetting('notificationMenu')">

<span id="notificationIcon">＋</span>
通知設定

</button>




<div id="notificationMenu"
class="setting-content"
style="display:none;">

<p>
📅 前日通知
</p>

<button
onclick="toggleNotification('before')"
id="beforeNotificationBtn">

OFF

</button>

<input
type="time"
id="beforeNotificationTime"
value="20:00">



<hr>



<p>
🔔 当日通知
</p>

<button
onclick="toggleNotification('today')"
id="todayNotificationBtn">

OFF

</button>

<input
type="time"
id="todayNotificationTime"
value="09:00">

</div>




</div>

<!-- =====================
     カテゴリ管理
===================== -->

<div class="card setting-item">


<button onclick="toggleSetting('categoryMenu')">

<span id="categoryIcon">＋</span>
🏷 カテゴリ管理

</button>



<div id="categoryMenu"
class="setting-content"
style="display:none;">


<p>
予定を分類するカテゴリを管理できます
</p>



<div id="category-list">

現在カテゴリなし

</div>

<hr>
<input
type="text"
id="category-name"
placeholder="カテゴリ名（例：推し活、仕事、旅行）">

<select id="category-icon">

<option value="📌">📌 その他</option>
<option value="⭐">⭐ 推し</option>
<option value="🎤">🎤 音楽・ライブ</option>
<option value="🎵">🎵 音楽</option>
<option value="⚽">⚽ スポーツ</option>
<option value="🏥">🏥 病院</option>
<option value="💼">💼 仕事</option>
<option value="✈️">✈️ 旅行</option>
<option value="🎁">🎁 プレゼント</option>
<option value="❤️">❤️ 大切</option>
<option value="💕">💕 恋愛</option>

</select>


<select id="category-color">

<option value="#ff66aa">
🩷 ピンク
</option>

<option value="#3399ff">
💙 ブルー
</option>

<option value="#33cc66">
💚 グリーン
</option>

<option value="#9966ff">
💜 パープル
</option>

<option value="#ff9933">
🧡 オレンジ
</option>

</select>

<button onclick="addCategory()">
➕ カテゴリ追加
</button>


</div>


</div>


</div>




<!-- =====================
     タブ
===================== -->


<div class="tabbar">


<div
class="tab active"
onclick="switchTab('home',event)">

🏠<br>
ホーム

</div>




<div
class="tab"
onclick="switchTab('calendarPage',event)">

📅<br>
カレンダー

</div>





<div
class="tab"
onclick="switchTab('oshiPage',event)">

⭐<br>
推し

</div>





<div
class="tab"
onclick="switchTab('settingsPage',event)">

⚙️<br>
設定

</div>



</div>






<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>




<script src="firebase.js?v=2"></script>
<script src="theme.js"></script>
<script src="category.js"></script>
<script src="calendar.js"></script>

<script src="planner.js"></script>

<script src="script.js"></script>

</body>

</html>
