<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>推し活手帳 v1.8</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="theme.css">
</head>


<body class="theme-neon-pink">

<div class="header">

<h1>推し活手帳</h1>

</div>




<!-- =====================
     ホーム
===================== -->


<div id="home" class="page active">


<div class="card">

<h2>🔔 新着通知</h2>

<div id="today-events" class="item">
該当なし
</div>

</div>



<div class="card">

<h2>📅 本日の予定</h2>

<div id="today-schedule" class="item">
該当なし
</div>

</div>


<div class="schedule-row"><div class="card half-card">

    <h2>🗓 今週の予定</h2>

    <div id="this-week-schedule" class="item">
    該当なし
    </div>

</div>


<div class="card half-card">

    <h2>📅 来週の予定</h2>

    <div id="next-week-schedule" class="item">
    該当なし
    </div>

</div>

</div><div class="card"><h2>📌 直近のイベント</h2>

<div id="upcoming-events" class="item">
該当なし
</div>

</div>






</div>





<!-- =====================
     カレンダー
===================== 

 -->

<!-- =====================
     カレンダー
===================== -->
<!-- =====================
     カレンダー
===================== -->


<div id="calendarPage" class="page">



<!-- =====================
     カレンダー本体
===================== -->

<div class="card">


<h2>
📅 カレンダー
</h2>


<div id="calendar">

</div>


</div>






<!-- =====================
     選択日の操作
===================== -->


<div class="card">


<div id="selected-event-area">


<p>
📌 日付を選択してください
</p>


</div>




<button
id="add-event-open-btn"
style="display:none;"
onclick="openEventForm()">


➕ この日に予定追加


</button>


</div>








<!-- =====================
     予定追加フォーム
     （選択後表示）
===================== -->


<div class="card"
id="event-form-card"
style="display:none;">



<h2>
➕ 予定追加
</h2>




<select id="event-category">


<option value="イベント">

🎫 イベント

</option>



<option value="フェス">

🎵 フェス

</option>



<option value="試合">

⚽ 試合

</option>



</select>







<input
type="text"
id="event-title"
placeholder="イベント名">








<input
type="datetime-local"
id="event-date">







<input
type="text"
id="event-place"
placeholder="場所">







<input
type="text"
id="meeting-time"
placeholder="待ち合わせ時間">








<input
type="text"
id="companions"
placeholder="同伴者">








<input
type="url"
id="map-url"
placeholder="GoogleマップURL">








<input
type="url"
id="ticket-url"
placeholder="チケットURL">







<button
onclick="saveEvent()">


💾 保存


</button>





<button
onclick="closeEventForm()">


キャンセル


</button>



</div>









<!-- =====================
     選択日の登録予定
===================== -->


<div class="card">


<h2>

📌 選択日の予定

</h2>



<div id="selected-date-events">


該当なし


</div>



</div>









<!-- =====================
     全イベント一覧
===================== -->


<div class="card">



<h2>

📋 登録済みイベント

</h2>





<select
id="event-filter"
onchange="displayEventList()">



<option value="all">

すべて

</option>




<option value="イベント">

🎫 イベント

</option>




<option value="フェス">

🎵 フェス

</option>




<option value="試合">

⚽ 試合

</option>



</select>







<div id="event-list">


該当なし


</div>




</div>





</div>




<!-- =====================
     推し
===================== -->


<div id="oshiPage" class="page">


<div class="card">


<h2>
⭐ 推し追加
</h2>



<select id="category-select">


<option value="artists">

🎤 アーティスト

</option>



<option value="sports">

⚽ スポーツ

</option>


</select>





<input
type="text"
id="oshi-search"
placeholder="推しを検索">





<button
onclick="addSelectedOshi()">

➕ 追加

</button>



<div id="search-results">

</div>



</div>







<div class="card">


<h2>
📚 推し一覧
</h2>



<div id="oshi-list">

該当なし

</div>



</div>


</div>







<!-- =====================
     設定
===================== -->


<div id="settingsPage" class="page">


<div class="card">


<h2>
⚙️ 設定
</h2>


<p>
現在無料プランです（予定5件・推し3件）
</p>


</div>



<div class="card">

<button onclick="toggleThemeMenu()">
🎨 背景テーマ
</button>

<div id="themeMenu" style="display:none;">

<button onclick="setTheme('neon-pink')">
🩷 Pink
</button>

<button onclick="setTheme('neon-blue')">
💙 Blue
</button>

<button onclick="setTheme('neon-purple')">
💜 Purple
</button>

<button onclick="setTheme('neon-green')">
💚 Green
</button>

<button onclick="setTheme('neon-orange')">
🧡 Orange
</button>

<button onclick="setTheme('love')">
💕 恋愛
</button>

<button onclick="setTheme('space')">
🌌 宇宙
</button>

<button onclick="setTheme('passion')">
🔥 情熱
</button>

<button onclick="setTheme('cool')">
❄️ クール
</button>

<button onclick="setTheme('friendship')">
🤝 友情
</button>

</div>

</div>



</div>







<!-- =====================
     タブ
===================== -->


<div class="tabbar">


<div
class="tab active"
onclick="switchTab('home',event)">

🏠<br>
ホーム

</div>




<div
class="tab"
onclick="switchTab('calendarPage',event)">

📅<br>
カレンダー

</div>





<div
class="tab"
onclick="switchTab('oshiPage',event)">

⭐<br>
推し

</div>





<div
class="tab"
onclick="switchTab('settingsPage',event)">

⚙️<br>
設定

</div>



</div>




<script src="script.js"></script>


<script src="theme.js"></script>

</body>

</html>
